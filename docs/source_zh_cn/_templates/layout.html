{% extends "!layout.html" %}

{% block htmltitle %}
    {% if pagename == "index" %}
    <title>openYuanrong | 官方文档</title>
    {% else %}
    <title>openYuanrong | {{ title|striptags|e }}</title>
    {% endif %}
{% endblock %}

{% block extrahead %}
    {{ super() }}
    {% if html_baseurl %}
    <link rel="canonical" href="{{ html_baseurl }}{{ pagename }}.html" />
    {% endif %}
<script>
document.addEventListener("DOMContentLoaded", function() {
    var end = document.querySelector('.navbar-header-items__end');
    if (end) {
        end.style.marginLeft = 'auto';
        end.style.marginRight = '0';
    }
});
</script>
{% endblock %}
